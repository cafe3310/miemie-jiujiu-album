  <div class="post-content">
    <p>咩咩是个左脸黑右脸橘的浅三花猫，大概是英短。生日大概是 2017 年 4 月 30 号。这些咩图都是 2018 年的。</p>
<p>咩咩是个有点聪明的毛米。感觉一肚子坏水，但又粘人。我家俩人都在的时候倒不明显，但只要其中一个人在家，这猫就会粘过去。看起来有点心机。</p>
