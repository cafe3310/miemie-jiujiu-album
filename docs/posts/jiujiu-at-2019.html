  <div class="post-content">
    <p>啾啾是个左脸橘右脸黑的三花猫，刚好和咩咩镜像，而且颜色稍微深一点儿。也大概是英短。</p>
<p>啾啾比咩咩小两岁，生日是 2019 年 4 月 20 号。会啾啾啾地叫。这些啾图都来自 2019 年。</p>
<p>这个猫非常活泼，看起来没什么脑子。基本上…就是个猫，三个脑细胞各负责吃睡玩儿。整天很开心。</p>
